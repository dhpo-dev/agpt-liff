<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGPT 付与報告</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Hiragino Sans", sans-serif; background: #f5f5f5; padding: 16px; }
    h1 { font-size: 20px; color: #FF9800; text-align: center; margin: 16px 0; }
    .form-group { margin: 12px 0; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .required::after { content: " *"; color: #E91E63; }
    input[type="text"], input[type="date"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;
      font-size: 16px; -webkit-appearance: none; }
    input[type="text"]:focus, input[type="date"]:focus { border-color: #FF9800; outline: none; }
    input.error-field { border-color: #E91E63; }
    .error-msg { color: #E91E63; font-size: 13px; margin-top: 6px; display: none; }
    button[type="submit"] { width: 100%; padding: 16px; background: #FF9800; color: #fff; border: none;
      border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    button:disabled { background: #ccc; }
    .status { text-align: center; padding: 20px; font-size: 14px; color: #555; }

    /* ===== 完了画面 ===== */
    .done-card { text-align: center; padding: 40px 20px; }
    .done-card .icon { font-size: 48px; margin-bottom: 12px; }
    .done-card h2 { font-size: 20px; color: #2E7D32; margin-bottom: 8px; }
    .done-card p { font-size: 13px; color: #666; line-height: 1.7; }
  </style>
</head>
<body>
  <h1>📋 チケット付与報告</h1>
  <form id="form">
    <input type="hidden" id="userId" name="userId">

    <div class="form-group">
      <label class="required">店舗名</label>
      <input name="storeName" type="text" placeholder="例: ポーカースポット渋谷" required>
    </div>
    <div class="form-group">
      <label class="required">チケットID</label>
      <input name="ticketId" id="ticketId" type="text" placeholder="例: 12345" required>
      <div class="error-msg" id="ticketError">チケットIDが存在しません</div>
    </div>
    <div class="form-group">
      <label class="required">付与先 Waitinglist ID</label>
      <input name="wlId" type="text" placeholder="例: WL-12345" required>
    </div>
    <div class="form-group">
      <label class="required">付与日</label>
      <input name="date" type="date" required>
    </div>

    <button type="submit">付与報告を送信</button>
  </form>

  <!-- ===== 完了画面 ===== -->
  <div id="doneScreen" style="display:none;">
    <div class="done-card">
      <div class="icon">✅</div>
      <h2>付与報告が完了しました</h2>
      <p>送信が完了しました。<br>内容はLINEメッセージでもお送りしています。</p>
      <p style="margin-top:16px;font-size:11px;color:#999;">この画面は自動的に閉じます</p>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009575513-pRqWROsZ';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxg9ZXqESvj3zM452178zTVdMH5BRPa9obpL66h7xraK-KVJtuwPU532zH74d1oBLjD/exec';

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        var ctx = liff.getContext();
        if (ctx && ctx.userId) {
          document.getElementById('userId').value = ctx.userId;
        } else if (liff.isLoggedIn()) {
          var profile = await liff.getProfile();
          document.getElementById('userId').value = profile.userId;
        }
        document.querySelector('[name="date"]').value = new Date().toISOString().split('T')[0];
      } catch (e) { /* init error */ }
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = '送信中...';

      // エラー表示をリセット
      const ticketInput = document.getElementById('ticketId');
      const ticketError = document.getElementById('ticketError');
      ticketInput.classList.remove('error-field');
      ticketError.style.display = 'none';

      const ticketIdVal = ticketInput.value.trim();
      const params = new URLSearchParams(new FormData(e.target));
      params.append('action', 'grant');

      try {
        // ① チケットID存在確認（GASから直接JSONを取得）
        const checkRes = await fetch(GAS_URL + '?action=checkTicket&ticketId=' + encodeURIComponent(ticketIdVal));
        const checkData = await checkRes.json();

        if (!checkData.exists) {
          ticketError.textContent = 'チケットIDが存在しません';
          ticketError.style.display = 'block';
          ticketInput.classList.add('error-field');
          btn.disabled = false; btn.textContent = '付与報告を送信';
          return;
        }

        if (checkData.status !== '配送済') {
          ticketError.textContent = 'このチケットは報告できません（ステータス: ' + checkData.status + '）';
          ticketError.style.display = 'block';
          ticketInput.classList.add('error-field');
          btn.disabled = false; btn.textContent = '付与報告を送信';
          return;
        }

        // ② 問題なければ本送信（GASに書き込み＋LINE通知）
        const grantRes = await fetch(GAS_URL + '?' + params.toString());
        const grantData = await grantRes.json();

        if (grantData.error) {
          ticketError.textContent = grantData.error;
          ticketError.style.display = 'block';
          ticketInput.classList.add('error-field');
          btn.disabled = false; btn.textContent = '付与報告を送信';
          return;
        }

        // 完了画面を表示
        document.getElementById('form').style.display = 'none';
        document.querySelector('h1').style.display = 'none';
        document.getElementById('doneScreen').style.display = 'block';
        setTimeout(() => { if (liff.isInClient()) liff.closeWindow(); }, 3000);
      } catch (err) {
        ticketError.textContent = '通信エラーが発生しました。再度お試しください。';
        ticketError.style.display = 'block';
        btn.disabled = false; btn.textContent = '付与報告を送信';
      }
    });

    init();
  </script>
</body>
</html>
